name: Publish to crates.io
on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout the code
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" copc-streaming/Cargo.toml
          sed -i "s/^version = .*/version = \"${VERSION}\"/" copc-temporal/Cargo.toml
          # Update path dependency to include version for crates.io
          sed -i "s|copc-streaming = { path = \"../copc-streaming\" }|copc-streaming = { path = \"../copc-streaming\", version = \"${VERSION}\" }|" copc-temporal/Cargo.toml

      - name: Publish copc-streaming
        run: cargo publish -p copc-streaming --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish copc-temporal
        run: cargo publish -p copc-temporal --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
